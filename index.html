<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>올블루 0LLBLUE — 웹툰·애니 발견의 바다</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root{
  --bg:#ffffff;
  --bg-soft:#f4f5f7;
  --bg-soft2:#eceef1;
  --ink:#16171a;
  --ink-2:#5b626b;
  --ink-3:#959ba3;
  --line:#e8eaed;
  --line-2:#d9dce0;
  --accent:#ff2e63;      /* 왓챠 스타일 핑크레드 — 주요 액션/평점 */
  --accent-deep:#e11551;
  --accent-soft:#ffe7ee;
  --blue:#0a66ff;        /* 올블루 오션 */
  --blue-2:#00c6ff;
  --gold:#ffaf1a;
  --shadow:0 2px 8px rgba(20,25,40,.06), 0 8px 28px rgba(20,25,40,.05);
  --shadow-lg:0 12px 40px rgba(20,25,40,.14);
  --r:16px; --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg-soft); color:var(--ink); -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}
img{display:block}
.app{max-width:1180px;margin:0 auto}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- TOP BAR ---------- */
.topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.86);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:13px 20px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0}
.logo .mark{width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue) 0%,var(--blue-2) 100%);
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;
  box-shadow:0 4px 12px rgba(10,102,255,.35)}
.logo .word{font-weight:900;font-size:21px;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--blue) 10%,var(--blue-2) 95%);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.logo .word small{display:block;font-size:9.5px;font-weight:700;letter-spacing:1.5px;
  color:var(--ink-3);-webkit-text-fill-color:var(--ink-3);margin-top:-3px}
.search{flex:1;max-width:440px;position:relative}
.search input{width:100%;background:var(--bg-soft);border:1.5px solid transparent;border-radius:999px;
  padding:10px 16px 10px 40px;font-size:14px;color:var(--ink);transition:.18s}
.search input:focus{outline:none;background:#fff;border-color:var(--blue)}
.search .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink-3);font-size:15px}
.topbar .spacer{flex:1}
.avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#ff7eb3,#ff2e63);color:#fff;display:grid;place-items:center;
  font-weight:800;font-size:14px;cursor:pointer;border:2px solid #fff;box-shadow:var(--shadow)}

/* ---------- TABS ---------- */
.tabs{position:sticky;top:57px;z-index:55;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.tabs-inner{max-width:1180px;margin:0 auto;display:flex;gap:4px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{padding:14px 16px;font-size:15px;font-weight:600;color:var(--ink-2);position:relative;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);font-weight:800}
.tab.active::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:3px;border-radius:3px 3px 0 0;
  background:var(--accent)}
.tab .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);
  vertical-align:super;margin-left:2px}

/* ---------- LAYOUT ---------- */
.view{padding:26px 20px 80px;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section{margin-bottom:38px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-head h2{font-size:20px;font-weight:800;letter-spacing:-.4px}
.section-head .sub{font-size:13px;color:var(--ink-3);font-weight:500}
.section-head .more{font-size:13px;color:var(--ink-2);font-weight:600}

/* ---------- POSTER GRID ---------- */
.grid{display:grid;gap:18px 16px}
.grid.works{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.poster-card{cursor:pointer;transition:.2s}
.poster-card:hover{transform:translateY(-4px)}
.poster{position:relative;aspect-ratio:3/4.2;border-radius:var(--r-sm);overflow:hidden;
  box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff}
.poster::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 35%,rgba(0,0,0,.55) 100%)}
.poster .ptitle{position:relative;z-index:2;font-weight:800;font-size:15px;line-height:1.25;
  text-shadow:0 1px 6px rgba(0,0,0,.4)}
.poster .ptype{position:relative;z-index:2;font-size:11px;font-weight:600;opacity:.92;margin-top:3px}
.poster .badge{position:absolute;top:9px;left:9px;z-index:3;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  font-size:10.5px;font-weight:700;padding:3px 7px;border-radius:6px}
.poster .savedmark{position:absolute;top:8px;right:8px;z-index:3;width:26px;height:26px;border-radius:50%;
  background:rgba(255,46,99,.92);display:none;place-items:center;font-size:13px}
.poster.saved .savedmark{display:grid}
.poster-card .meta{margin-top:9px}
.poster-card .meta .t{font-weight:700;font-size:14px;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poster-card .meta .r{font-size:12.5px;color:var(--ink-2);margin-top:2px;font-weight:600}
.star-mini{color:var(--accent)}

/* ---------- CARD / CHIP ---------- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg-soft);color:var(--ink-2);
  font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;transition:.15s}
button.chip{cursor:pointer}
button.chip:hover{background:var(--bg-soft2)}
.chip.tag{color:var(--blue);background:#eef4ff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;font-size:14px;
  border-radius:11px;padding:12px 18px;transition:.15s;border:1.5px solid transparent}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-deep)}
.btn-ghost{background:var(--bg-soft);color:var(--ink)}
.btn-ghost:hover{background:var(--bg-soft2)}
.btn-line{background:#fff;border-color:var(--line-2);color:var(--ink)}
.btn-line:hover{border-color:var(--ink-3)}
.btn-line.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{filter:brightness(.94)}

/* ---------- HOME HERO ---------- */
.hero{position:relative;border-radius:22px;overflow:hidden;color:#fff;padding:40px 36px;margin-bottom:34px;
  background:radial-gradient(120% 140% at 8% 10%,#0a66ff 0%,#063e9e 45%,#021b4a 100%)}
.hero::before{content:"";position:absolute;right:-60px;top:-40px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,198,255,.5),transparent 65%);filter:blur(8px)}
.hero .eyebrow{font-size:13px;font-weight:700;letter-spacing:1px;color:#9fd1ff;position:relative}
.hero h1{font-size:34px;font-weight:900;letter-spacing:-1px;margin:8px 0 10px;position:relative;line-height:1.15}
.hero p{font-size:15px;color:#cfe1ff;max-width:540px;position:relative}
.hero .northstar{display:flex;gap:14px;margin-top:24px;position:relative;flex-wrap:wrap}
.ns{background:rgba(255,255,255,.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.18);
  border-radius:14px;padding:14px 18px;min-width:150px}
.ns .lab{font-size:11.5px;color:#bcd6ff;font-weight:600}
.ns .num{font-size:26px;font-weight:900;margin-top:2px;letter-spacing:-.5px}
.ns .num small{font-size:13px;font-weight:700;color:#bcd6ff}
.ns .delta{font-size:11.5px;font-weight:700;color:#7dffc0;margin-top:1px}

/* reco card with reason */
.reco-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.reco{display:flex;gap:13px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px;
  box-shadow:var(--shadow);cursor:pointer;transition:.18s}
.reco:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.reco .pp{width:66px;height:90px;border-radius:8px;flex-shrink:0;color:#fff;display:flex;align-items:flex-end;
  padding:6px;font-weight:800;font-size:11px}
.reco .info{min-width:0}
.reco .info .t{font-weight:800;font-size:15px}
.reco .info .why{font-size:12.5px;color:var(--accent);font-weight:700;margin-top:5px;display:flex;align-items:center;gap:4px}
.reco .info .desc{font-size:12.5px;color:var(--ink-2);margin-top:4px;line-height:1.45}

/* curator post */
.curator{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.curator .top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.mini-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}
.badge-pill{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff}
.curator .q{font-size:14.5px;font-weight:600;line-height:1.55}
.curator .foot{display:flex;gap:16px;margin-top:11px;color:var(--ink-2);font-size:13px;font-weight:600}
.curator .foot button:hover{color:var(--accent)}

/* ---------- WORK DETAIL ---------- */
.back{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--ink-2);margin-bottom:18px;font-size:14px}
.back:hover{color:var(--ink)}
.detail-hero{display:grid;grid-template-columns:230px 1fr;gap:30px;margin-bottom:34px}
.detail-poster{aspect-ratio:3/4.2;border-radius:14px;box-shadow:var(--shadow-lg);color:#fff;
  display:flex;align-items:flex-end;padding:16px;font-weight:900;font-size:20px;line-height:1.2;
  text-shadow:0 2px 8px rgba(0,0,0,.4)}
.detail-info h1{font-size:30px;font-weight:900;letter-spacing:-.8px;line-height:1.15}
.detail-info .meta-line{color:var(--ink-2);font-size:14px;font-weight:600;margin-top:8px}
.rating-block{display:flex;align-items:center;gap:22px;margin:18px 0;flex-wrap:wrap}
.rating-block .avg{display:flex;align-items:baseline;gap:8px}
.rating-block .avg .n{font-size:34px;font-weight:900;color:var(--accent);letter-spacing:-1px}
.rating-block .avg .c{font-size:13px;color:var(--ink-3);font-weight:600}
.myrate{display:flex;flex-direction:column;gap:4px}
.myrate .lab{font-size:12px;color:var(--ink-3);font-weight:600}
.stars{display:flex;gap:2px;font-size:26px;color:var(--line-2);cursor:pointer}
.stars .s{transition:.1s}
.stars .s.on{color:var(--accent)}
.stars .s:hover{transform:scale(1.12)}
.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.tag-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:18px}

.detail-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start}
@media(max-width:860px){.detail-grid{grid-template-columns:1fr}.detail-hero{grid-template-columns:140px 1fr;gap:18px}}
.block{margin-bottom:30px}
.block h3{font-size:17px;font-weight:800;margin-bottom:12px;letter-spacing:-.3px}
.synopsis{font-size:14.5px;color:var(--ink);line-height:1.7}
.info-table{width:100%;border-collapse:collapse;font-size:14px}
.info-table td{padding:10px 0;border-bottom:1px solid var(--line);vertical-align:top}
.info-table td.k{color:var(--ink-3);font-weight:600;width:96px}
.info-table td.v{font-weight:600}
.platforms{display:flex;gap:10px;flex-wrap:wrap}
.plat{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:10px 14px;
  font-weight:700;font-size:13.5px;cursor:pointer;transition:.15s}
.plat:hover{border-color:var(--ink-3)}
.plat .pill{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800}

/* timeline */
.tl-toggle{display:flex;gap:6px;margin-bottom:14px}
.tl-toggle button{font-size:13px;font-weight:700;padding:7px 14px;border-radius:999px;background:var(--bg-soft);color:var(--ink-2)}
.tl-toggle button.on{background:var(--ink);color:#fff}
.tl-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.tl-item .no{width:26px;height:26px;border-radius:8px;background:var(--bg-soft);display:grid;place-items:center;
  font-weight:800;font-size:13px;color:var(--ink-2);flex-shrink:0}
.tl-item .name{font-weight:700;font-size:14.5px}
.tl-item .sub{margin-left:auto;font-size:12.5px;color:var(--ink-3);font-weight:600}

/* reco mini cards in sidebar */
.side-card{padding:18px}
.reco-mini{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.reco-mini:last-child{border-bottom:none}
.reco-mini:hover .t{color:var(--accent)}
.reco-mini .pp{width:44px;height:60px;border-radius:7px;flex-shrink:0}
.reco-mini .t{font-weight:700;font-size:13.5px;transition:.15s}
.reco-mini .s{font-size:11.5px;color:var(--ink-3);margin-top:2px;font-weight:600}
.reco-mini .match{font-size:11.5px;color:var(--blue);font-weight:700;margin-top:3px}

/* comment */
.cmt-input{background:var(--bg-soft);border-radius:12px;padding:14px}
.cmt-input textarea{width:100%;border:none;background:transparent;resize:none;font-size:14px;min-height:46px;color:var(--ink)}
.cmt-input textarea:focus{outline:none}
.cmt-input .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.cmt{padding:16px 0;border-bottom:1px solid var(--line)}
.cmt .head{display:flex;align-items:center;gap:9px}
.cmt .nm{font-weight:800;font-size:14px}
.cmt .stars-sm{color:var(--accent);font-size:13px;font-weight:700}
.cmt .body{font-size:14px;margin:9px 0;line-height:1.6}
.cmt .reco-tag{font-size:12.5px;color:var(--blue);font-weight:700;background:#eef4ff;display:inline-block;padding:4px 10px;border-radius:8px;margin-bottom:9px}
.cmt .foot{display:flex;gap:16px;color:var(--ink-2);font-size:13px;font-weight:600}
.cmt .foot button:hover{color:var(--accent)}

/* ---------- CONTENT HALL ---------- */
.hall-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.hall-card{position:relative;border-radius:18px;padding:22px;color:#fff;overflow:hidden;cursor:pointer;
  min-height:150px;display:flex;flex-direction:column;justify-content:space-between;transition:.2s;box-shadow:var(--shadow)}
.hall-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.hall-card .emo{font-size:30px}
.hall-card h3{font-size:18px;font-weight:900;margin-top:auto;letter-spacing:-.4px}
.hall-card p{font-size:13px;opacity:.92;margin-top:4px;line-height:1.4}
.hall-card .live{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.22);font-size:11px;
  font-weight:800;padding:4px 9px;border-radius:999px;display:flex;align-items:center;gap:5px}
.hall-card .live::before{content:"";width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
@keyframes blink{50%{opacity:.3}}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(15,20,35,.55);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex;animation:fade .2s}
.modal{background:#fff;border-radius:22px;max-width:560px;width:100%;box-shadow:var(--shadow-lg);
  animation:pop .25s cubic-bezier(.2,.8,.3,1.2);margin:auto 0}
@keyframes pop{from{transform:scale(.94) translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-head h2{font-size:19px;font-weight:900;letter-spacing:-.4px}
.modal-head .x{width:32px;height:32px;border-radius:50%;background:var(--bg-soft);display:grid;place-items:center;font-size:16px;color:var(--ink-2)}
.modal-head .x:hover{background:var(--bg-soft2)}
.modal-body{padding:18px 22px 24px}

/* worldcup */
.wc-stage{text-align:center}
.wc-round{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:14px}
.wc-pair{display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;gap:8px}
.wc-pick{cursor:pointer;border-radius:14px;overflow:hidden;transition:.15s}
.wc-pick:hover{transform:scale(1.03)}
.wc-pick .img{aspect-ratio:3/4;display:flex;align-items:flex-end;padding:12px;color:#fff;font-weight:800;font-size:16px;
  text-shadow:0 2px 6px rgba(0,0,0,.4)}
.wc-pick .nm{padding:10px;font-weight:800;font-size:14px;background:var(--bg-soft)}
.wc-vs{font-weight:900;color:var(--ink-3);font-size:15px}
.wc-prog{height:6px;background:var(--bg-soft);border-radius:999px;margin-bottom:18px;overflow:hidden}
.wc-prog i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:.3s}

/* bar chart */
.bar-row{margin-bottom:16px}
.bar-row .lab{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:6px}
.bar-row .lab .v{color:var(--ink-2)}
.bar-track{height:34px;background:var(--bg-soft);border-radius:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:9px;transition:width .5s cubic-bezier(.2,.8,.3,1);min-width:8px}
.boost{margin-top:10px}

/* tag vote */
.tv-input{display:flex;gap:8px;margin-bottom:16px}
.tv-input input{flex:1;border:1.5px solid var(--line-2);border-radius:11px;padding:11px 14px;font-size:14px}
.tv-input input:focus{outline:none;border-color:var(--blue)}
.tv-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.tv-item .rank{font-weight:900;color:var(--ink-3);width:18px;font-size:14px}
.tv-item .tg{flex:1;font-weight:700;color:var(--blue);font-size:14px}
.tv-item .cnt{font-weight:800;font-size:14px;color:var(--ink-2);min-width:42px;text-align:right}
.tv-item .up{width:34px;height:34px;border-radius:9px;background:var(--bg-soft);display:grid;place-items:center;font-size:14px}
.tv-item .up:hover{background:var(--accent-soft);color:var(--accent)}

/* attendance */
.att-week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin:6px 0 18px}
.att-day{aspect-ratio:1;border-radius:12px;background:var(--bg-soft);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;font-weight:700;position:relative}
.att-day .d{font-size:11px;color:var(--ink-3)}
.att-day .n{font-size:15px}
.att-day.done{background:var(--accent);color:#fff}
.att-day.done .d{color:rgba(255,255,255,.8)}
.att-day.today{box-shadow:0 0 0 2.5px var(--blue) inset}

/* ranking predict */
.rk-item{display:flex;align-items:center;gap:12px;background:var(--bg-soft);border-radius:12px;padding:11px 14px;margin-bottom:9px}
.rk-item .pp{width:38px;height:50px;border-radius:7px;flex-shrink:0}
.rk-item .nm{flex:1;font-weight:700;font-size:14px}
.rk-item .ar{display:flex;flex-direction:column;gap:2px}
.rk-item .ar button{width:26px;height:18px;border-radius:5px;background:#fff;display:grid;place-items:center;font-size:10px;color:var(--ink-2)}
.rk-item .ar button:hover{color:var(--blue)}
.rk-item .pos{font-weight:900;color:var(--accent);width:22px;text-align:center}

/* scenes */
.scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.scene{aspect-ratio:16/10;border-radius:12px;display:grid;place-items:center;color:#fff;font-size:22px;position:relative;overflow:hidden}

============================================================ */
function renderWorks(){
  const q = STATE.search.trim().toLowerCase();
  const mood = STATE.moodFilter?moodById(STATE.moodFilter):null;
  let list = WORKS.slice();
  if(mood) list = list.filter(mood.f);
  if(q) list = list.filter(w=>(w.t+w.genres.join()+w.tags.join()+w.type).toLowerCase().includes(q));
  const v=document.getElementById('view');
  const genres=[...new Set(WORKS.flatMap(w=>w.genres))];
  const active = q || mood;
  v.innerHTML=`
  <div class="section">
    <div class="section-head">
      <h2>작품관</h2>
      <span class="sub">웹툰 ${WORKS.filter(w=>w.type.includes('웹툰')).length} · 애니 ${WORKS.filter(w=>w.type.includes('애니')).length} · 총 ${WORKS.length}편 (MVP)</span>
    </div>
    <div style="font-size:12.5px;color:var(--ink-3);font-weight:700;margin-bottom:9px">🛋️ 무드로 발견하기</div>
    <div class="mood-row" style="margin-bottom:16px">
      ${MOODS.map(m=>`<div class="mood" style="height:78px;width:142px;background:linear-gradient(140deg,${m.g[0]},${m.g[1]});${STATE.moodFilter===m.k?'outline:3px solid var(--ink);outline-offset:2px':''}" onclick="setMood('${m.k}')"><span class="e" style="font-size:20px">${m.e}</span><span class="l">${m.l}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px">
      ${genres.map(g=>`<button class="chip" onclick="document.getElementById('searchInput').value='${g}';onSearch('${g}')">#${g}</button>`).join('')}
    </div>
    ${active?`<div style="font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:14px">${mood?`<b style="color:var(--ink)">${mood.e} ${mood.l}</b>`:''}${mood&&q?' · ':''}${q?`“${STATE.search}”`:''} 결과 ${list.length}편 · <button style="color:var(--accent);font-weight:700" onclick="clearFilters()">전체 보기</button></div>`:''}
    ${list.length?`<div class="grid works">${list.map(posterCard).join('')}</div>`
      :`<div class="empty"><div class="e">🌊</div><p>조건에 맞는 작품이 아직 없어요.<br>다른 무드나 키워드로 찾아보세요.</p></div>`}
  </div>`;
}
function setMood(k){STATE.moodFilter=(STATE.moodFilter===k?null:k);STATE.search='';const si=document.getElementById('searchInput');if(si)si.value='';if(CURRENT!=='works')go('works');else renderWorks();}
function clearFilters(){STATE.moodFilter=null;STATE.search='';const si=document.getElementById('searchInput');if(si)si.value='';renderWorks();}
function onSearch(val){
  STATE.search=val;
  if(CURRENT!=='works') go('works'); else renderWorks();
}

function commentHTML(rv){
  return `<div class="cmt">

    ${rv.reco?`<div class="reco-tag" style="margin-top:9px">이거 좋아하면 → ${rv.reco}</div>`:''}

    <div class="foot"><button onclick="bumpHelp(this)">👍 도움돼요 <b>${rv.help}</b></button><button>💬 댓글 ${rv.cmt}</button></div>
  </div>`;
}
function rate(id,v){
  STATE.ratings[id]=v;
  document.querySelectorAll('#stars .s').forEach(s=>s.classList.toggle('on',+s.dataset.v<=v));
  document.querySelector('.myrate .lab').textContent=`내 별점 (${v}.0)`;
  toast(`⭐ ${v}점 평가 완료 · 큐레이터 활동 +1`);
}
function toggleSave(id){
  const b=document.getElementById('saveBtn');
  if(STATE.saved.has(id)){STATE.saved.delete(id);b.classList.remove('on');b.textContent='+ 보고싶어요';toast('보고싶어요에서 뺐어요')}
  else{STATE.saved.add(id);b.classList.add('on');b.textContent='✓ 보고싶어요 담음';toast('🌊 보고싶어요에 담았어요 · 컬렉션 도감에 추가')}
}
function postComment(id){
  const ta=document.getElementById('cmtInput');const txt=ta.value.trim();
  if(!txt){toast('한 줄이라도 영업글을 적어주세요');ta.focus();return}
  const rv={n:'소연(나)',av:'#ff2e63',badge:['항해사','#0a66ff'],r:STATE.ratings[id]||5,reco:'',b:txt,help:0,cmt:0};
  const list=document.getElementById('cmtList');
  list.insertAdjacentHTML('afterbegin',commentHTML(rv));
  ta.value='';toast('💬 코멘트가 등록됐어요');
}
function bumpHelp(btn){const b=btn.querySelector('b');b.textContent=+b.textContent+1;btn.style.color='var(--accent)'}

/* v2: 시청 상태 / 연재 알림 / 진행도 기록 */
function syncStatusSeg(id){
  const seg=document.getElementById('statusSeg');
  if(seg)seg.querySelectorAll('button').forEach((b,idx)=>b.classList.toggle('on',Object.keys(STATUS_META)[idx]===STATE.status[id]));
}
function setStatus(id,k){
  if(STATE.status[id]===k){delete STATE.status[id]}else{STATE.status[id]=k}
  syncStatusSeg(id);
  const m=STATUS_META[k];
  toast(STATE.status[id]?`${m.e} ‘${m.l}’(으)로 기록했어요`:'상태 기록을 해제했어요');
}
function toggleNotify(id){
  const sw=document.getElementById('notifySw');
  if(STATE.notify.has(id)){STATE.notify.delete(id);sw.classList.remove('on');toast('알림을 껐어요')}
  else{STATE.notify.add(id);sw.classList.add('on');toast('🔔 새 화·시즌 알림을 켰어요')}
}
function timelineHTML(w,id){
  const p=STATE.progress[id];
  return w.timeline.map((t,i)=>{
    const watched=p!==undefined&&i<=p;
    return `<div class="tl-item" style="cursor:pointer" onclick="setProgress(${id},${i})">
      <span class="no" style="${watched?'background:var(--blue);color:#fff':''}">${watched?'✓':i+1}</span>
      <span class="name">${t[0]}</span>
      <span class="sub">${i===p?'📍 여기까지 봤어요':t[1]}</span>
    </div>`}).join('');
}
function setProgress(id,i){
  STATE.progress[id]=i;
  if(!STATE.status[id]){STATE.status[id]='watch';syncStatusSeg(id)}
  const list=document.getElementById('tlList');if(list)list.innerHTML=timelineHTML(byId(id),id);
  toast(`📍 ${byId(id).timeline[i][0]}까지 봤어요로 기록`);
}

/* 추천 엔진: 설문 답변 → 선호 장르·태그로 점수화 */
function recommend(ans){
  const moodMap={
    cry:{g:['로맨스','드라마'],t:['감동','감정선']}, fun:{g:['액션','코미디'],t:['사이다','웃김']},
    empty:{g:['일상','코미디'],t:['힐링','입문추천']}, epic:{g:['다크판타지','판타지'],t:['명작','성장물']},
    flutter:{g:['로맨스'],t:['로판','감정선']}, thrill:{g:['스릴러','다크판타지'],t:['반전미친','떡밥']},
    heal:{g:['일상','로맨스'],t:['힐링','잔잔']}, stim:{g:['액션','무협'],t:['광기','중독성']},
  };
  const toneMap={'사이다·먼치킨':['사이다','먼치킨'],'잔잔한 감정선':['감정선','잔잔','로판'],'떡밥·반전':['떡밥','반전미친','메타'],'작화·연출 甲':['작화미친','연출'],'입문하기 쉬운':['입문추천']};
  PREF={g:new Set(),t:new Set()};
  (ans.genre||[]).forEach(lbl=>{const m=GENRE_MAP[lbl];if(m){(m.g||[]).forEach(g=>PREF.g.add(g));(m.t||[]).forEach(t=>PREF.t.add(t))}else PREF.g.add(lbl)});
  ans.mood.forEach(m=>{const mm=moodMap[m];if(mm){mm.g.forEach(g=>PREF.g.add(g));mm.t.forEach(t=>PREF.t.add(t))}});
  if(ans.tone&&toneMap[ans.tone])toneMap[ans.tone].forEach(t=>PREF.t.add(t));
  const pain=ans.pain||[];
  const scored=WORKS.map(w=>{
    let sc=w.rating*0.3;
    w.genres.forEach(g=>{if(PREF.g.has(g))sc+=3});
    w.tags.forEach(t=>{if(PREF.t.has(t))sc+=2});
    if(ans.ctype&&ans.ctype!=='all'){sc+=w.type.includes(ans.ctype)?2:-4}
    if(ans.pace==='완결작 한 번에'&&w.status==='완결')sc+=2;
    if(ans.pace==='몰아서 정주행'&&w.hours>=20)sc+=1.5;
    if(ans.pace==='가볍게 한두 편'&&w.hours<=12)sc+=1.5;
    if(ans.why==='인생작을 만나고 싶어서')sc+=(w.rating-4)*2;
    // 어려웠던 점(페인포인트)을 발견 기준으로 반영
    if(pain.includes('start')){if(w.tags.includes('입문추천'))sc+=2.5;sc+=(w.comp-85)*0.05}
    if(pain.includes('fail')){sc+=(w.comp-85)*0.08;if(w.rating>=4.7)sc+=1}        // 실패 회피 → 검증된 고완주작
    if(pain.includes('platform')){if((w.plat||[]).length>=2)sc+=1.5}              // 여러 플랫폼에서 볼 수 있는 작품
    if(pain.includes('long')){if(w.hours<=10)sc+=2.5;else if(w.hours>=24)sc-=3;else if(w.hours>=18)sc-=1}
    if(pain.includes('niche')){if(w.tags.includes('숨은명작'))sc+=3;if(w.count<5000)sc+=2;else if(w.count>15000)sc-=1.5}
    if(pain.includes('ongoing')){sc+=(w.status==='완결'?2:-2.5)}                  // 완결작 선호
    if(pain.includes('samey')){if(w.count<7000)sc+=1}                             // 뻔하지 않은 작품
    return {w,sc};
  });
  scored.sort((a,b)=>b.sc-a.sc);
  return scored.slice(0,3).map(x=>x.w.id);
}
function whyText(w,ans){
  ans=ans||{};const pain=ans.pain||[];
  if(pain.includes('niche')&&(w.tags.includes('숨은명작')||w.count<5000)) return '아직 덜 알려진 숨은 명작';
  if(pain.includes('long')&&w.hours<=10) return `예상 완주 ${w.hours}시간 · 부담 없어요`;
  if(pain.includes('fail')&&w.comp>=90) return `완주율 ${w.comp}% · 실패 걱정 적어요`;
  const gm=w.genres.find(g=>PREF.g.has(g));
  if(gm) return `#${gm} 취향에 딱 맞아요`;
  const tm=w.tags.find(t=>PREF.t.has(t));
  if(tm) return `#${tm} 요소가 강한 작품`;
  if(pain.includes('start')&&w.tags.includes('입문추천')) return '입문하기 좋은 작품';
  return `★${w.rating} · 많은 유저가 만족한 작품`;
}
function applyTaste(){
  if(ONB&&ONB.ans) STATE.taste={nickname:ONB.ans.nickname,genres:[...ONB.ans.genre]};
}
/* 결과 카드 클릭 → 독서(정주행) 1일차 → 상세로 이동 */
function tasteStart(id){
  applyTaste();
  STATE.status[id]='watch';
  const w=byId(id);
  const v=document.getElementById('view');
  v.innerHTML=`<div class="onb-wrap"><div class="onb-card" style="text-align:center">
    <div class="onb-rc" style="cursor:default;border:none;justify-content:center;background:transparent;padding:0;margin-bottom:18px">
      <div class="pp" style="width:84px;height:114px;background:${grad(w.genres[0])}">${w.t}</div>
    </div>
    <div class="onb-title">오늘이 덕질 1일차! 🎉</div>
    <div class="onb-sub">이미 절반은 성공이에요.<br><b style="color:var(--ink)">${w.t}</b> 정주행을 시작해볼까요?</div>
    <div class="onb-nav"><button class="btn btn-primary" onclick="openDetail(${id})">지금 정주행 시작하기</button></div>
    <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="ONB.step=${TASTE_STEPS.length-1};renderTaste()">← 추천 다시 보기</button>
  </div></div>`;
}

renderTabs();
renderHome();
